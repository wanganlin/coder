name: gin
language: go
paradigm: lightweight
fileExtension: .go
skeleton:
  - template: skeleton/go.mod.hbs
    output: go.mod
  - template: skeleton/db.go.hbs
    output: db/db.go
  - template: skeleton/main.go.hbs
    output: main.go
  - template: skeleton/router.go.hbs
    output: router.go
  - template: skeleton/Dockerfile.hbs
    output: Dockerfile
  - template: skeleton/docker-compose.yml.hbs
    output: docker-compose.yml
  - template: skeleton/migration.up.sql.hbs
    output: migrations/000001_init_schema.up.sql
entityTemplates:
  - template: entity/model.go.hbs
    output: model/{{snakeCase tableName}}.go
  - template: entity/dto.go.hbs
    output: model/{{snakeCase tableName}}_dto.go
  - template: entity/handler.go.hbs
    output: handler/{{snakeCase tableName}}.go
  - template: entity/model_test.go.hbs
    output: model/{{snakeCase tableName}}_test.go
    test: true
